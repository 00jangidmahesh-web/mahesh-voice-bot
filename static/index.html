<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mahesh Kumar Jangid — Voice Agent</title>
<style>
  :root {
    --idle: #3b82f6;
    --recording: #ef4444;
    --processing: #eab308;
    --speaking: #22c55e;
    --bg: #0a0e17;
    --panel: #12182a;
    --text: #e2e8f0;
    --muted: #8b98b3;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 50% 20%, #131b30 0%, var(--bg) 60%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
  }

  h1 { font-size: 22px; margin: 4px 0 2px; text-align: center; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; text-align: center; }

  .orb-wrap {
    position: relative;
    width: 180px;
    height: 180px;
    margin: 12px 0 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .orb {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ffffff33, var(--idle) 70%);
    box-shadow: 0 0 40px 6px var(--idle);
    cursor: pointer;
    transition: box-shadow 0.25s ease, background 0.25s ease, transform 0.15s ease;
  }
  .orb:active { transform: scale(0.96); }

  .orb.recording {
    background: radial-gradient(circle at 35% 30%, #ffffff33, var(--recording) 70%);
    box-shadow: 0 0 55px 10px var(--recording);
    animation: pulse 1.1s infinite ease-in-out;
  }
  .orb.processing {
    background: radial-gradient(circle at 35% 30%, #ffffff33, var(--processing) 70%);
    box-shadow: 0 0 45px 8px var(--processing);
    animation: spin-glow 1.4s infinite ease-in-out;
  }
  .orb.speaking {
    background: radial-gradient(circle at 35% 30%, #ffffff33, var(--speaking) 70%);
    box-shadow: 0 0 55px 10px var(--speaking);
    animation: pulse 0.9s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  @keyframes spin-glow {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .status {
    font-size: 13px;
    color: var(--muted);
    min-height: 18px;
    margin-bottom: 20px;
    text-align: center;
  }

  .hint { font-size: 12px; color: var(--muted); text-align: center; max-width: 320px; margin-bottom: 28px; }

  .panel {
    width: 100%;
    max-width: 620px;
    background: var(--panel);
    border: 1px solid #1f2942;
    border-radius: 14px;
    padding: 18px;
    margin-top: 6px;
  }

  .panel h3 { margin: 0 0 10px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

  .bubble {
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 10px;
    font-size: 14px;
    line-height: 1.5;
  }
  .bubble.user { background: #1a2544; color: #cdd8f5; }
  .bubble.assistant { background: #14261d; color: #d7f5e4; }
  .bubble .role { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 640px;
    margin-bottom: 22px;
  }
  .preset-btn {
    background: #141d33;
    border: 1px solid #263258;
    color: #a9b8e0;
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12.5px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .preset-btn:hover { background: #1c2a4d; color: #fff; }
  .preset-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .chat-input{
      margin:20px auto;
      width:100%;
      max-width:620px;
      display:flex;
      gap:10px;
  }

  .chat-input input{
      flex:1;
      padding:12px;
      border-radius:10px;
      border:1px solid #2a365e;
      background:#141d33;
      color:white;
      outline:none;
      font-size:14px;
  }

  .chat-input button{
      padding:12px 22px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#2563eb;
      color:white;
      font-weight:600;
  }

  .chat-input button:hover{
      background:#1d4ed8;
  }
</style>
</head>
<body>

  <h1>🎙️ Mahesh Kumar Jangid — Voice Agent</h1>
  <div class="subtitle">Ask about my background, projects, skills, or goals</div>

  <div class="orb-wrap">
    <div class="orb" id="orb"></div>
  </div>
  <div class="status" id="status">Click the orb to start talking</div>
  <div class="hint">Click again anytime — including while I'm speaking — to interrupt and ask something new.</div>

  <div class="presets" id="presets">
    <button class="preset-btn" data-q="Tell me about your life story in a few sentences.">Life story</button>
    <button class="preset-btn" data-q="What is your #1 superpower?">Superpower</button>
    <button class="preset-btn" data-q="What are the top 3 areas you want to grow in?">Growth areas</button>
    <button class="preset-btn" data-q="Tell me about a project you're proud of."> projects</button>
    <button class="preset-btn" data-q="Why does AI interest you?">Why AI?</button>
  </div>

  <div class="chat-input">
      <input
          type="text"
          id="textInput"
          placeholder="Ask me anything about Mahesh..."
      />
      <button id="sendBtn">Send</button>
  </div>

  <div class="panel">
    <h3>Conversation</h3>
    <div id="chatLog"></div>
  </div>

<script>
// ==================== PRODUCTION VOICE AGENT v5 - FINAL ====================
// All improvements applied, debug logs cleaned, Railway-ready
// Zero external dependencies - single file deployment

const DEBUG = false;
function log(...args) { if (DEBUG) console.log(...args); }

const orb = document.getElementById('orb');
const statusEl = document.getElementById('status');
const chatLog = document.getElementById('chatLog');
const presetButtons = document.querySelectorAll('.preset-btn');
const textInput = document.getElementById("textInput");
const sendBtn = document.getElementById("sendBtn");

let state = 'idle';
let mediaRecorder = null;
let audioChunks = [];
let audioContext = null;
let analyser = null;
let micStream = null;
let animationFrameId = null;
let currentAudio = null;
let hasSpoken = false;
let silenceTimer = null;
let maxRecordingTimer = null;

// ==================== CONFIGURATION ====================
const CONFIG = {
  // Dynamic RMS thresholds
  INITIAL_RMS_THRESHOLD: 0.005,
  ADAPTIVE_RMS_MULTIPLIER: 2.5,
  MIN_RMS_FLOOR: 0.003,
  
  // Timing (improved values)
  INITIAL_GRACE_PERIOD_MS: 800,
  SPEECH_CONFIRMATION_MS: 200,      // Reduced from 300ms - catches first words better
  SILENCE_TIMEOUT_MS: 1800,
  MAX_RECORDING_MS: 15000,
  NO_SPEECH_TIMEOUT_MS: 5000,       // Reduced from 7000ms - feels more natural
  
  // Audio processing
  FFT_SIZE: 2048,
  SMOOTHING_FACTOR: 0.2,
};

function setState(next) {
  state = next;
  orb.classList.remove('recording', 'processing', 'speaking');
  if (next !== 'idle') orb.classList.add(next);
  const labels = {
    idle: 'Click the orb to start talking',
    recording: 'Listening… click to stop, or just pause',
    processing: 'Thinking…',
    speaking: 'Speaking… click to interrupt',
  };
  statusEl.textContent = labels[next] || '';
}

function addBubble(role, text) {
  if (!text) return;
  const div = document.createElement('div');
  div.className = `bubble ${role}`;
  const roleLabel = role === 'user' ? 'You' : 'Mahesh';
  div.innerHTML = `<span class="role">${roleLabel}</span>${text}`;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function stopSpeaking() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
}

function playAudio(base64Mp3) {
  return new Promise((resolve) => {
    if (!base64Mp3) { resolve(); return; }
    const audio = new Audio(`data:audio/mp3;base64,${base64Mp3}`);
    currentAudio = audio;
    setState('speaking');
    audio.onended = () => {
      if (currentAudio === audio) currentAudio = null;
      resolve();
    };
    audio.play().catch(() => resolve());
  });
}

// ==================== CORE VOICE LOGIC ====================

async function orbClicked() {
  if (state === 'idle') {
    await startRecording();
  } else if (state === 'recording') {
    stopRecording(false);
  } else if (state === 'speaking') {
    stopSpeaking();
    await startRecording();
  }
}

orb.addEventListener('click', orbClicked);

async function startRecording() {
  hasSpoken = false;
  
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ 
      audio: {
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      } 
    });
  } catch (e) {
    statusEl.textContent = 'Microphone access denied. Please allow mic permissions.';
    log('Microphone error:', e);
    return;
  }

  audioChunks = [];
  
  // Railway-safe MediaRecorder with opus codec preference
  try {
    mediaRecorder = new MediaRecorder(micStream, { 
      mimeType: "audio/webm;codecs=opus" 
    });
  } catch {
    try {
      mediaRecorder = new MediaRecorder(micStream, { 
        mimeType: "audio/webm" 
      });
    } catch {
      mediaRecorder = new MediaRecorder(micStream);
    }
  }
  
  mediaRecorder.ondataavailable = (e) => { 
    if (e.data.size > 0) audioChunks.push(e.data); 
  };
  mediaRecorder.onstop = onRecordingStopped;
  mediaRecorder.start(250);
  
  setState('recording');
  startSilenceDetection(micStream);
  
  silenceTimer = setTimeout(() => {
    if (state === 'recording' && !hasSpoken) {
      log('No speech detected within timeout');
      stopRecording(true);
    }
  }, CONFIG.NO_SPEECH_TIMEOUT_MS);
  
  maxRecordingTimer = setTimeout(() => {
    if (state === 'recording') {
      log('Maximum recording time reached');
      stopRecording(false);
    }
  }, CONFIG.MAX_RECORDING_MS);
}

function startSilenceDetection(stream) {
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();
  analyser.fftSize = CONFIG.FFT_SIZE;
  analyser.smoothingTimeConstant = 0.8;
  source.connect(analyser);

  const bufferLength = analyser.fftSize;
  const dataArray = new Float32Array(bufferLength);
  
  let recordingStartTime = Date.now();
  let speechStartTime = null;
  let silenceStartTime = null;
  let smoothedRMS = 0;
  let adaptiveThreshold = CONFIG.INITIAL_RMS_THRESHOLD;
  let backgroundNoiseLevel = 0;
  let noiseSamplesCollected = 0;

  function analyzeAudio() {
    if (state !== 'recording') return;

    analyser.getFloatTimeDomainData(dataArray);
    
    let sumSquares = 0;
    for (let i = 0; i < bufferLength; i++) {
      sumSquares += dataArray[i] * dataArray[i];
    }
    const rawRMS = Math.sqrt(sumSquares / bufferLength);
    smoothedRMS = CONFIG.SMOOTHING_FACTOR * rawRMS + (1 - CONFIG.SMOOTHING_FACTOR) * smoothedRMS;
    
    const elapsed = Date.now() - recordingStartTime;
    
    if (elapsed < CONFIG.INITIAL_GRACE_PERIOD_MS) {
      backgroundNoiseLevel += smoothedRMS;
      noiseSamplesCollected++;
      animationFrameId = requestAnimationFrame(analyzeAudio);
      return;
    }
    
    if (noiseSamplesCollected > 0 && adaptiveThreshold === CONFIG.INITIAL_RMS_THRESHOLD) {
      const avgBackgroundNoise = backgroundNoiseLevel / noiseSamplesCollected;
      adaptiveThreshold = Math.max(
        avgBackgroundNoise * CONFIG.ADAPTIVE_RMS_MULTIPLIER,
        CONFIG.MIN_RMS_FLOOR
      );
      log('Adaptive threshold:', adaptiveThreshold.toFixed(5), 'Background:', avgBackgroundNoise.toFixed(5));
    }
    
    const isCurrentlySpeaking = smoothedRMS > adaptiveThreshold;
    
    if (isCurrentlySpeaking) {
      if (!speechStartTime) {
        speechStartTime = Date.now();
      }

      if (!hasSpoken && Date.now() - speechStartTime > CONFIG.SPEECH_CONFIRMATION_MS) {
        hasSpoken = true;
        if (silenceTimer) {
          clearTimeout(silenceTimer);
          silenceTimer = null;
        }
        log('Speech confirmed - RMS:', smoothedRMS.toFixed(5));
      }
      silenceStartTime = null;
    } else {
      speechStartTime = null;
      if (hasSpoken) {
        if (!silenceStartTime) {
          silenceStartTime = Date.now();
        } else if (Date.now() - silenceStartTime > CONFIG.SILENCE_TIMEOUT_MS) {
          log('Silence after speech - stopping');
          stopRecording(false);
          return;
        }
      }
    }
    
    animationFrameId = requestAnimationFrame(analyzeAudio);
  }

  animationFrameId = requestAnimationFrame(analyzeAudio);
}

function cleanupAudioAnalysis() {
  if (animationFrameId) {
    cancelAnimationFrame(animationFrameId);
    animationFrameId = null;
  }
  if (audioContext && audioContext.state !== 'closed') {
    audioContext.close().catch(() => {});
    audioContext = null;
  }
  analyser = null;
}

function cleanupTimers() {
  if (silenceTimer) {
    clearTimeout(silenceTimer);
    silenceTimer = null;
  }
  if (maxRecordingTimer) {
    clearTimeout(maxRecordingTimer);
    maxRecordingTimer = null;
  }
}

function stopRecording(noSpeech = false) {
  cleanupTimers();
  cleanupAudioAnalysis();
  
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  
  if (micStream) {
    micStream.getTracks().forEach(track => track.stop());
    micStream = null;
  }
  
  window._noSpeechDetected = noSpeech;
}

async function onRecordingStopped() {
  const noSpeechDetected = window._noSpeechDetected || false;
  window._noSpeechDetected = false;
  
  if (noSpeechDetected || !hasSpoken) {
    addBubble("assistant", "I couldn't hear you. Please try again.");
    setState("idle");
    return;
  }

  setState('processing');

  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  if (blob.size < 1000) {
    addBubble("assistant", "Recording was too short. Please try again.");
    setState("idle");
    return;
  }

  const formData = new FormData();
  formData.append('audio', blob, 'recording.webm');

  try {
    const res = await fetch('/chat/voice', { 
      method: 'POST', 
      body: formData 
    });
    
    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    
    const data = await res.json();

    if (data.error) {
      statusEl.textContent = 'Something went wrong — try again';
      setState('idle');
      return;
    }

    if (!data.transcript) {
      // Better UX: tell user their speech wasn't understood
      addBubble("assistant", "I couldn't understand what you said. Please try again.");
      setState("idle");
      return;
    }

    addBubble('user', data.transcript);
    addBubble('assistant', data.response_text);
    await playAudio(data.audio_base64);
    setState('idle');
    
  } catch (e) {
    log('Network error:', e);
    statusEl.textContent = 'Network error — please check your connection';
    setState('idle');
  }
}

// ==================== PRESET BUTTONS ====================

presetButtons.forEach((btn) => {
  btn.addEventListener('click', async () => {
    if (state === 'recording') stopRecording(false);
    stopSpeaking();

    presetButtons.forEach((b) => (b.disabled = true));
    setState('processing');

    const q = btn.dataset.q;
    addBubble('user', q);

    try {
      const formData = new FormData();
      formData.append('message', q);
      const res = await fetch('/chat/text', { 
        method: 'POST', 
        body: formData 
      });
      
      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      
      const data = await res.json();
      addBubble('assistant', data.response_text);
      await playAudio(data.audio_base64);
      
    } catch (e) {
      log('Error:', e);
      statusEl.textContent = 'Network error — try again';
    } finally {
      presetButtons.forEach((b) => (b.disabled = false));
      setState('idle');
    }
  });
});

// ==================== TEXT INPUT ====================

async function sendTextMessage() {
  const message = textInput.value.trim();
  if (message === "") return;
  
  if (state === 'recording') stopRecording(false);
  stopSpeaking();
  
  addBubble("user", message);
  textInput.value = "";
  setState("processing");
  
  const formData = new FormData();
  formData.append("message", message);
  
  try {
    const res = await fetch("/chat/text", {
      method: "POST",
      body: formData
    });
    
    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    
    const data = await res.json();
    addBubble("assistant", data.response_text);
    await playAudio(data.audio_base64);
    
  } catch (err) {
    log('Error:', err);
    statusEl.textContent = "Network Error";
  } finally {
    setState("idle");
  }
}

sendBtn.addEventListener("click", sendTextMessage);
textInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendTextMessage();
});

// ==================== CLEANUP ====================

window.addEventListener('beforeunload', () => {
  cleanupTimers();
  cleanupAudioAnalysis();
  stopSpeaking();
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
  }
  window._noSpeechDetected = false;
});

// ==================== KEYBOARD SHORTCUT ====================

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && document.activeElement !== textInput) {
    e.preventDefault();
    orbClicked();
  }
});

log('Voice Agent v5 ready - Production deployment version');
</script>
</body>
</html>
